<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CAFEBRICCOマフィン計算機</title>
</head>

<body>
    <header>
        <div class="logo">
            <img src="https://cafe-bricco.cainz.com/wp-content/themes/cafebricco/img/logo_footer.svg" alt="logo">
        </div>
    </header>
    <main>
        <div class="display-wrapper">
            <div id="number-dis" class="dis number">
                <p>個数</p>
            </div>
            <div id="total-dis" class="dis total">
                <p>合計</p>
            </div>
        </div>
        <div class="btn-wrapper">
            <div class="btn-line a-line">
                <button class="btn" onclick="buttonClick('btn0')"><img class="image" src="https://storage.googleapis.com/staging.cafe-bricco-pj.appspot.com/1/2021/04/p_menu15.jpg" alt="プレーン"><span class="btn-name">name</span></button>
                <button class="btn" onclick="buttonClick('btn1')"><img class="image" src="https://storage.googleapis.com/staging.cafe-bricco-pj.appspot.com/1/2021/09/ogura-butter_m.jpg" alt="おぐらバター"><span class="btn-name">name</span></button>
                <button class="btn" onclick="buttonClick('btn2')"><img class="image" src="https://storage.googleapis.com/staging.cafe-bricco-pj.appspot.com/1/2022/05/fae3ba47ab52e3ba7d34d5a1e4882131.jpg" alt="ブルーベリーチーズ"><span class="btn-name">name</span></button>
                <button class="btn" onclick="buttonClick('btn3')"><img class="image" src="https://storage.googleapis.com/staging.cafe-bricco-pj.appspot.com/1/2021/07/Lowcarveplane.jpg" alt="低糖質プレーン"><span class="btn-name">name</span></button>
            </div>

            <div class="btn-line b-line">
                <button class="btn" onclick="buttonClick('btn4')"><img class="image" src="https://storage.googleapis.com/staging.cafe-bricco-pj.appspot.com/1/2021/11/d878675852e31b2b74e499da2692527c.jpg" alt="フォンダンショコラ"><span class="btn-name">name</span></button>
                <button class="btn" onclick="buttonClick('btn5')"><img class="image" src="https://storage.googleapis.com/staging.cafe-bricco-pj.appspot.com/1/2022/01/484ad879c944440b65e7dd60ed412f3b-1.jpg" alt="チョコバナナ"><span class="btn-name">name</span></button>
                <button class="btn" onclick="buttonClick('btn6')"><img class="image" src="https://storage.googleapis.com/staging.cafe-bricco-pj.appspot.com/1/2021/03/004.jpg" alt="チョコクランチ"><span class="btn-name">name</span></button>
                <button class="btn" onclick="buttonClick('btn7')"><img class="image" src="https://storage.googleapis.com/staging.cafe-bricco-pj.appspot.com/1/2022/01/a583e57c0a5d4fd908e860eb595236fa.jpg" alt="オレンジ＆ヨーグルト"><span class="btn-name">name</span></button>
            </div>

            <div class="btn-line c-line">
                <button class="btn" onclick="buttonClick('btn8')"><img class="image" src="https://storage.googleapis.com/staging.cafe-bricco-pj.appspot.com/1/2022/12/6086265b707a73bf86d2212e5a8fb108.jpg" alt="クリームブリュレ"><span class="btn-name">name</span></button>
                <button class="btn" onclick="buttonClick('btn9')"><img class="image" src="https://storage.googleapis.com/staging.cafe-bricco-pj.appspot.com/1/2022/04/9cc23ab7fb4f582b4bc24756c54025bf.jpg" alt="メロンパン"><span class="btn-name">name</span></button>
                <button class="btn" onclick="buttonClick('btn10')"><img class="image" src="https://storage.googleapis.com/staging.cafe-bricco-pj.appspot.com/1/2021/06/9d23b789e71a08a4730f2169fd4c5986.jpg" alt="アップルカスタード"><span class="btn-name">name</span></button>
                <!-- <button class="btn" onclick="ClickFunction('btn11')"><img class="image" src="" alt=""><span class="btn-name">name</span></button> -->
            </div>
            <div>
                <button onclick="resetValue()">reset</button>
                <button onclick="undoValue()">undo</button>
            </div>
        </div>
    </main>
</body>

<footer>

<footer>

<script src="../app.js"></script>

</html>
